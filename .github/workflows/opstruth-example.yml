name: opstruth Example

on:
  workflow_dispatch:

jobs:
  opstruth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install published opstruth
        run: npm install -g opstruth@0.1.2
      - name: Prepare evidence directory
        run: mkdir -p evidence
      - name: Run opstruth markdown evidence
        run: opstruth --out evidence/opstruth.md
      - name: Run opstruth JSON evidence
        run: opstruth --json --skip evidence > evidence/opstruth.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: opstruth-evidence
          path: evidence/
