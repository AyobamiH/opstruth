name: CI

on:
  push:
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: cli
      - run: npm run lint
        working-directory: cli
      - run: npm test
        working-directory: cli
      - run: node bin/opstruth.js --help
        working-directory: cli
      - run: node bin/opstruth.js --skip quality
        working-directory: cli

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: website
      - run: npm run lint
        working-directory: website
      - run: npm run build
        working-directory: website
